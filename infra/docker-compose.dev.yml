name: ann-search

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ../backend:/app
      - ../data:/app/data
      - ../indexes:/app/data/indexes
      - /app/.venv
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      WATCHFILES_FORCE_POLLING: "true"
      # 本地 5173 被宿主进程占用，前端改用 5273，这里同步放行其跨域来源。
      CORS_ORIGINS: http://localhost:5273,http://localhost:5173
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ../backend:/app
      - ../data:/app/data
      - ../indexes:/app/data/indexes
      - /app/.venv
    command: arq app.tasks.worker.WorkerSettings --watch /app/app

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      # 容器内 Vite 代理 /api 的目标：用服务名而非 localhost（后者指向 frontend 容器自身）。
      VITE_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      # 宿主 5173 被占用，改用 5273 映射到容器内 Vite 的 5173。访问 http://localhost:5273
      - "5273:5173"
    command: npm run dev -- --host 0.0.0.0 --port 5173
