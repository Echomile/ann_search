{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>索引管理</h2>

    <form>
        <label>选择索引类型：</label>
        <select name="index_type">
            <option value="hnsw">HNSW</option>
            <option value="brute_force">精确检索</option>
        </select>

        <label>距离度量：</label>
        <select name="metric">
            <option value="l2">欧氏距离</option>
            <option value="cosine">余弦距离</option>
        </select>

        <button type="button">构建索引</button>
    </form>

    <hr>

    <h3>索引状态</h3>
    <p>当前状态：未构建索引</p>
</div>
{% endblock %}
