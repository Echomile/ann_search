{% extends "base.html" %}

{% block content %}
<div class="card">
    <h1>面向单细胞高维向量数据的 ANN 检索系统</h1>
    <p>
        本系统用于对单细胞高维向量数据进行近似最近邻检索，
        支持数据读取、索引构建、Top-K 相似细胞查询、结果展示与性能评估。
    </p>

    <div class="module-grid">
        <div class="module-card">
            <h3>数据集管理</h3>
            <p>上传和读取单细胞 h5ad 数据集。</p>
            <a href="/dataset">进入</a>
        </div>

        <div class="module-card">
            <h3>索引管理</h3>
            <p>构建和加载 ANN 检索索引。</p>
            <a href="/index_manage">进入</a>
        </div>

        <div class="module-card">
            <h3>相似细胞检索</h3>
            <p>输入细胞编号，返回 Top-K 相似细胞。</p>
            <a href="/search">进入</a>
        </div>
    </div>
</div>
{% endblock %}
